<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steel Ball Run</title>
    <link rel="stylesheet" href="sbrstyles.css">
    <link rel="icon" type="image/png" href="../../web_images/sbr_logo.png">
</head>

<body>

    <!-- Banner principal con botón de registro -->
    <div class="main-banner">
        <button class="btn-register">Registrarse</button>
        <img class="banner-logo" src="../../web_images/Logo_Steel_Ball_Run.png" alt="Steel Ball Run Logo">
    </div>

    <!-- Tabla de clasificación -->
    <h2>Tabla de clasificación</h2>
    <table class="sbr-table">
        <thead>
            <tr>
                <th>Competidor</th>
                <th>Caballo</th>
                <th>Origen</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Gyro Zeppeli</td>
                <td>Valkyrie</td>
                <td>Reino de Nápoles</td>
            </tr>
            <tr>
                <td>Johnny Joestar</td>
                <td>Slow Dancer</td>
                <td>EE. UU.</td>
            </tr>
            <tr>
                <td>Diego Brando</td>
                <td>Silver Bullet</td>
                <td>Reino Unido</td>
            </tr>
        </tbody>
    </table>

    <!-- Spacer decorativo con imagen de asistentes -->
    <div class="spacer-big">
        <img class="assistants-table" src="../../web_images/assistants.png" alt="Asistentes">
    </div>

    <footer class="main-footer">
        <p>Steel Ball Run 1890</p>
        <div class="character-corner">
            <img src="../../web_images/assistant_footer.png" alt="Personaje">
        </div>
    </footer>

</body>

</html>

<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBR - Registro de Corredor</title>
    <link rel="stylesheet" href="sbrstyles.css">
    <link rel="icon" type="image/png" href="../web_images/sbr_logo.png">
</head>

<body>
    <!-- Header con logo y navegación -->
    <header class="main-header">
        <img src="../web_images/Logo_Steel_Ball_Run.png" alt="Steel Ball Run Logo" class="logo">
        <nav>
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="index.html#about">Acerca de</a></li>
                <li><a href="index.html#staff">Staff</a></li>
                <li><a href="index.html#contact">Contacto</a></li>
            </ul>
        </nav>
    </header>
    <!-- Página principal de registro -->
    <main class="register-page">
        <h1>Registro de corredor</h1>
        <!-- Layout de dos columnas: personaje a la izquierda, formulario a la derecha -->
        <div class="register-layout">
            <!-- Columna izquierda: personaje -->
            <div class="inscryption-guy">
                <img src="../web_images/staff_register.jpg" alt="Personaje de registro">
            </div>
            <!-- Burbuja de diálogo (posicionada sobre el personaje) -->
            <p class="bubble">Ehh... rellena los campos y pulsa el botón de registro</p>
            <!-- Columna derecha: formulario -->
            <div class="inscryption-form">
                <form action="#" method="post" class="sbr-form">
                    <fieldset>
                        <legend>Datos Personales</legend>
                        <div class="field">
                            <label for="runner-name">Nombre</label>
                            <input type="text" id="runner-name" name="runner-name" required>
                        </div>
                        <div class="field">
                            <label for="runner-surnames">Apellidos</label>
                            <input type="text" id="runner-surnames" name="runner-surnames" required>
                        </div>
                        <div class="field-group">
                            <div class="field">
                                <label for="runner-age">Edad</label>
                                <input type="number" id="runner-age" name="runner-age" min="16" required>
                            </div>
                            <div class="field">
                                <label for="runner-dni">DNI</label>
                                <input type="text" id="runner-dni" name="runner-dni" required>
                            </div>
                        </div>
                    </fieldset>
                    <fieldset>
                        <legend>Datos de montura</legend>
                        <div class="field">
                            <label for="horse-name">Nombre</label>
                            <input type="text" id="horse-name" name="horse-name" required>
                        </div>
                        <div class="field">
                            <label for="horse-type">Tipo de montura</label>
                            <input type="text" id="horse-type" name="horse-type" required>
                        </div>
                    </fieldset>
                    <div class="form-actions">
                        <input type="submit" value="Registrarse" class="btn btn-save">
                        <input type="reset" value="Limpiar formulario" class="btn btn-reset">
                    </div>
                </form>
            </div>
        </div>
    </main>
    <footer class="main-footer">
        <p>Steel Ball Run 1890</p>
    </footer>
</body>

</html>

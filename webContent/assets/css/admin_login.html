<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBR — Acceso</title>
    <link rel="stylesheet" href="sbrstyles.css">
    <link rel="icon" type="image/png" href="../web_images/sbr_logo.png">
</head>
<body>
    <div class="login-wrapper">

        <div class="login-title">
            <h1>⚙ Sistema de Gestión</h1>
            <p>Steel Ball Run 1890 — Área Restringida</p>
        </div>

        <div class="login-box">
            <h2>🔒 Identificación</h2>

            <div class="login-error" id="loginError">
                Usuario o contraseña incorrectos. Inténtalo de nuevo.
            </div>

            <div class="sbr-form" style="background:transparent; padding:0;">
                <div class="field">
                    <label for="admin-user">Usuario</label>
                    <input type="text" id="admin-user" name="admin-user"
                           autocomplete="username" placeholder="admin">
                </div>
                <div class="field">
                    <label for="admin-pass">Contraseña</label>
                    <input type="password" id="admin-pass" name="admin-pass"
                           autocomplete="current-password" placeholder="••••••••">
                </div>
                <button type="button" class="btn-login-submit" onclick="doLogin()">
                    Entrar al panel
                </button>
            </div>

            <hr class="login-divider">

            <p style="text-align:center; font-family:'Formal',serif; font-size:0.82rem; color:#888;">
                ¿No tienes cuenta de administrador?<br>
                Contacta con el director de carrera.
            </p>
        </div>

        <a href="index.html" class="login-back">← Volver al inicio</a>
    </div>

    <script>
        const ADMIN_USER = 'admin';
        const ADMIN_PASS = 'sbr1890';

        // Si ya está autenticado como admin, ir directo al panel
        if (sessionStorage.getItem('sbr_admin_auth') === 'true') {
            window.location.href = 'admin.html';
        }
        // Si ya está autenticado como usuario, ir al perfil
        if (sessionStorage.getItem('sbr_user_auth') === 'true') {
            window.location.href = 'perfil.html';
        }

        function doLogin() {
            const user = document.getElementById('admin-user').value.trim();
            const pass = document.getElementById('admin-pass').value;
            const errEl = document.getElementById('loginError');

            if (user === ADMIN_USER && pass === ADMIN_PASS) {
                sessionStorage.setItem('sbr_admin_auth', 'true');
                sessionStorage.setItem('sbr_username', user);
                window.location.href = 'admin.html';
            } else {
                errEl.classList.add('visible');
                document.getElementById('admin-pass').value = '';
                document.getElementById('admin-pass').focus();
            }
        }

        document.addEventListener('keydown', e => {
            if (e.key === 'Enter') doLogin();
        });
    </script>
</body>
</html>

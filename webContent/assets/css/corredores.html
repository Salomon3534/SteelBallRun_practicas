<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBR - Corredores (Vista Estática)</title>
    <link rel="icon" type="image/png" href="../web_images/sbr_logo.png">
    <link rel="stylesheet" href="sbrstyles.css">
</head>

<body>
    <header class="main-header">
        <img src="../web_images/Logo_Steel_Ball_Run.png" alt="Steel Ball Run Logo" style="height: 50px;">
        <nav>
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="corredores.html" style="text-decoration:underline">Corredores</a></li>
                <li><a href="etapas.html">Etapas</a></li>
                <li><a href="patrocinadores.html">Patrocinadores</a></li>
                <li><a href="acerca.html">Acerca de</a></li>
                <li id="session-nav-item"><a href="admin_login.html" id="session-btn">Iniciar sesion</a></li>
            </ul>
        </nav>
    </header>

    <main class="runners-page">
        <h1>Corredores</h1>
        <div class="runners-grid" id="runnersGrid"></div>
    </main>

    <footer class="main-footer">
        <p>Steel Ball Run 1890</p>
    </footer>

    <script>
        const runners = [
            { id: 1, name: "Gyro", surname: "Zeppeli", origin: "Reino de Nápoles", horse: "Valkyrie", status: "active", lastPos: "Kansas", num: "1" },
            { id: 2, name: "Johnny", surname: "Joestar", origin: "EE. UU. (Kentucky)", horse: "Slow Dancer", status: "active", lastPos: "Missouri", num: "2" },
            { id: 3, name: "Diego", surname: "Brando", origin: "Reino Unido", horse: "Silver Bullet", status: "active", lastPos: "Ohio", num: "3" },
            { id: 4, name: "Hot Pants", surname: "—", origin: "EE. UU.", horse: "Costello", status: "active", lastPos: "Indiana", num: "4" },
            { id: 5, name: "Mountain Tim", surname: "—", origin: "EE. UU.", horse: "Oh Lonesome Me", status: "retired", lastPos: "Illinois", num: "5" },
            { id: 6, name: "Pocoloco", surname: "—", origin: "EE. UU.", horse: "Hey Ya", status: "active", lastPos: "Nebraska", num: "6" },
            { id: 7, name: "Sandman", surname: "—", origin: "EE. UU. (Nativo)", horse: "In a Silent Way", status: "dq", lastPos: "Iowa", num: "7" },
            { id: 8, name: "Wekapipo", surname: "—", origin: "Austria", horse: "—", status: "dq", lastPos: "Dakota", num: "8" },
        ];

        const statusLabel = { active: "En carrera", dq: "Descalificado", retired: "Retirado" };
        const statusBadge = { active: "badge-active", dq: "badge-dq", retired: "badge-retired" };

        function renderCards() {
            const grid = document.getElementById('runnersGrid');
            grid.innerHTML = '';
            runners.forEach(r => {
                const card = document.createElement('div');
                card.className = 'runner-card';

                // Se han eliminado los listeners de clic y la gestión de la clase 'selected'
                card.innerHTML = `
                    <div class="runner-img-container">
                        <img src="../_SOURCE/characters/blackmore.jpg" alt="${r.name}">
                    </div>
                    <div class="runner-stats">
                        <h3>#${r.num} ${r.name} ${r.surname}</h3>
                        <div class="runner-meta">
                            <span><strong>Origen:</strong> ${r.origin}</span>
                            <span><strong>Montura:</strong> ${r.horse}</span>
                            <span><strong>Última posición:</strong> ${r.lastPos}</span>
                        </div>
                        <span class="runner-badge ${statusBadge[r.status]}">${statusLabel[r.status]}</span>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        renderCards();
    </script>
</body>

</html>
